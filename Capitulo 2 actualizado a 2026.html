<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Oficial Capítulo 2 - Verificado 2026</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #d32f2f; text-align: center; border-bottom: 3px solid #d32f2f; padding-bottom: 10px; }
        .status { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; color: #555; }
        .question { font-size: 1.2em; margin-bottom: 20px; color: #1a237e; font-weight: 600; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option { padding: 15px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .option:hover { border-color: #d32f2f; background: #fff8f8; }
        .correct { background-color: #c8e6c9 !important; border-color: #2e7d32 !important; color: #1b5e20; font-weight: bold; }
        .wrong { background-color: #ffcdd2 !important; border-color: #c62828 !important; color: #b71c1c; }
        .feedback { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; background: #e3f2fd; border-left: 5px solid #2196f3; font-size: 0.95em; }
        button { width: 100%; padding: 15px; background: #d32f2f; color: white; border: none; border-radius: 8px; font-size: 1.1em; cursor: pointer; margin-top: 20px; display: none; }
        .results { text-align: center; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Capítulo 2: Señalamiento Vial</h1>
    
    <div id="quiz-box">
        <div class="status">
            <span>Pregunta: <span id="q-idx">1</span>/40</span>
            <span>Aciertos: <span id="score-idx">0</span></span>
        </div>

        <div id="content">
            <div class="question" id="q-text"></div>
            <div class="options" id="opt-box"></div>
        </div>

        <div class="feedback" id="feedback"></div>
        <button id="btn-next" onclick="next()">Continuar</button>
    </div>

    <div class="results" id="res-box">
        <h2>Resultado Final</h2>
        <div style="font-size: 3em; color: #d32f2f;" id="final-pct">0%</div>
        <p id="final-msg"></p>
        <button style="display:block" onclick="location.reload()">Reiniciar Práctica</button>
    </div>
</div>

<script>
const db = [
    {
        q: "Según la clasificación general, ¿cuáles son los tres tipos de señales verticales?",
        a: ["Rojas, Amarillas y Azules", "Reglamentación, Prevención e Información", "Obligatorias, Peligrosas y Turísticas", "Manuales, Sonoras y Luminosas"],
        c: 1,
        f: "Basado en la pág. 89 del manual: Las señales verticales se agrupan en reglamentación, prevención e información."
    },
    {
        q: "En el señalamiento horizontal, ¿qué indica el color AMARILLO en las líneas?",
        a: ["Que los carriles van en el mismo sentido", "Que separa corrientes de tránsito en sentidos opuestos", "Que es una zona de estacionamiento", "Que se aproxima una curva"],
        c: 1,
        f: "Pág. 108: El amarillo separa sentidos opuestos; el blanco separa carriles del mismo sentido."
    },
    {
        q: "¿Qué significa una línea de centro AMARILLA DISCONTINUA?",
        a: ["Prohibido adelantar", "Indica zona de curva", "Permite el adelantamiento", "Carril exclusivo para buses"],
        c: 2,
        f: "Pág. 108: La línea discontinua indica que el adelantamiento está permitido si hay seguridad."
    },
    {
        q: "La señal de CEDA EL PASO tiene una forma específica. ¿Cuál es?",
        a: ["Octagonal", "Circular", "Triangular con el vértice hacia abajo", "Rombo"],
        c: 2,
        f: "Pág. 93: El Ceda es un triángulo invertido para ser reconocido por detrás."
    },
    {
        q: "¿Qué indica la presencia de una 'Caja Amarilla' (cuadrícula) en una intersección?",
        a: ["Zona de carga de mercancías", "Prohibición de bloquear la intersección", "Lugar para giros en U", "Espacio para oficiales de tránsito"],
        c: 1,
        f: "Pág. 115: Prohíbe que los conductores queden detenidos dentro de la intersección."
    },
    {
        q: "¿Cuál es el color de las señales de prevención (advertencia de peligro)?",
        a: ["Rojo", "Verde", "Amarillo", "Azul"],
        c: 2,
        f: "Pág. 98: Las señales de prevención son rombos amarillos con símbolos negros."
    },
    {
        q: "Si un oficial de tránsito está de PERFIL hacia usted, ¿qué debe hacer?",
        a: ["Detenerse por completo", "Continuar la marcha (equivale a luz verde)", "Acelerar bruscamente", "Esperar un toque de silbato"],
        c: 1,
        f: "Pág. 120: El perfil del oficial indica vía libre."
    },
    {
        q: "¿Qué significa un solo toque de silbato largo y seco de un oficial?",
        a: ["Marcha / Siga", "Alto", "Acelerar", "Girar a la derecha"],
        c: 1,
        f: "Pág. 121: Un toque largo es ALTO; dos toques cortos son SIGA."
    },
    {
        q: "En el semáforo, ¿qué indica la luz roja intermitente?",
        a: ["Semáforo dañado", "Equivale a una señal de ALTO", "Aviso de cambio a verde", "Precaución extrema"],
        c: 1,
        f: "Pág. 118: El rojo intermitente obliga a la detención total antes de cruzar."
    },
    {
        q: "¿Qué indica una línea blanca continua de borde?",
        a: ["Separación de sentidos opuestos", "Prohibido adelantar", "Delimita el borde de la calzada con el espaldón", "Carril de bus"],
        c: 2,
        f: "Pág. 111: Las líneas de borde separan la calzada del espaldón o la acera."
    },
    {
        q: "Las señales de información de servicios generales (como hospitales) son de color:",
        a: ["Verde", "Azul", "Café", "Rojo"],
        c: 1,
        f: "Pág. 104: Los servicios generales se representan con fondo azul."
    },
    {
        q: "¿Qué forma tiene la señal reglamentaria de ALTO?",
        a: ["Circular", "Triangular", "Octagonal", "Cuadrada"],
        c: 2,
        f: "Pág. 93: Es la única señal octagonal para ser identificada desde cualquier ángulo."
    },
    {
        q: "Las señales de información TURÍSTICA suelen tener fondo de color:",
        a: ["Azul", "Café (Marrón)", "Verde", "Naranja"],
        c: 1,
        f: "Pág. 106: El café se utiliza para destinos turísticos, ecológicos o culturales."
    },
    {
        q: "¿Qué indica la luz amarilla del semáforo?",
        a: ["Acelerar para pasar", "Detenerse si es seguro, pues la luz cambiará a rojo", "Prioridad de paso", "Giro a la izquierda"],
        c: 1,
        f: "Pág. 117: Advierte que el periodo de verde ha terminado y viene el rojo."
    },
    {
        q: "¿Cuál es la función del señalamiento vertical de REGLAMENTACIÓN?",
        a: ["Dar consejos de viaje", "Indicar obligaciones, prohibiciones o restricciones legales", "Mostrar rutas alternas", "Advertir sobre curvas"],
        c: 1,
        f: "Pág. 90: Estas señales imponen leyes cuyo irrespeto es sancionable."
    },
    {
        q: "Un conductor que saca el brazo izquierdo y lo coloca en posición de escuadra (hacia arriba) indica:",
        a: ["Giro a la izquierda", "Giro a la derecha", "Detención o reducción de velocidad", "Permiso de rebase"],
        c: 1,
        f: "Pág. 122: Brazo en ángulo hacia arriba indica giro a la derecha."
    },
    {
        q: "¿Qué color tienen las señales de mantenimiento u obras temporales?",
        a: ["Amarillo", "Verde", "Naranja", "Blanco"],
        c: 2,
        f: "Pág. 107: El naranja se reserva para trabajos en la vía."
    },
    {
        q: "¿Qué significa el símbolo de un DIAMANTE blanco en el carril?",
        a: ["Zona de derrumbes", "Carril exclusivo para transporte público o alta ocupación", "Velocidad mínima", "Parada de taxis"],
        c: 1,
        f: "Pág. 114: El diamante identifica carriles con restricciones de uso (Vao/Bus)."
    },
    {
        q: "Los captafaros (ojos de gato) de color ROJO sirven para:",
        a: ["Indicar zona de semáforos", "Advertir que el conductor circula en contravía", "Indicar velocidad máxima", "Separar carriles del mismo sentido"],
        c: 1,
        f: "Pág. 116: Si ves ojos de gato rojos, vas en sentido contrario al flujo legal."
    },
    {
        q: "La línea de centro DOBLE AMARILLA CONTINUA indica:",
        a: ["Permitido adelantar de un solo lado", "Prohibición máxima de adelantar para ambos sentidos", "Carril reversible", "Zona de parqueo"],
        c: 1,
        f: "Pág. 109: Es una barrera infranqueable que prohíbe el rebase por peligrosidad."
    },
    {
        q: "¿Qué es la línea de parada (transversal blanca)?",
        a: ["Donde los peatones cruzan", "El límite antes del cual deben detenerse los vehículos", "Una marca de parqueo", "Indica fin de carril"],
        c: 1,
        f: "Pág. 112: Se ubica antes de intersecciones o pasos de cebra."
    },
    {
        q: "¿Cuál es el significado de una luz verde en el semáforo?",
        a: ["Pasar con los ojos cerrados", "Derecho de paso, verificando que la intersección esté despejada", "Giro obligatorio", "Acelerar al máximo"],
        c: 1,
        f: "Pág. 117: Permite el avance, pero no exime de precaución."
    },
    {
        q: "Las señales con fondo VERDE FLUORESCENTE se usan para:",
        a: ["Zonas de fiesta", "Alta visibilidad en zonas escolares o peatonales", "Parques nacionales", "Rutas nocturnas"],
        c: 1,
        f: "Pág. 100: Se usa para maximizar la seguridad de usuarios vulnerables (niños)."
    },
    {
        q: "En la jerarquía de señales, ¿cuál tiene la prioridad absoluta?",
        a: ["Semáforo", "Señal de Alto", "Órdenes del Oficial de Tránsito", "Líneas en el piso"],
        c: 2,
        f: "Pág. 123: El oficial de tránsito manda sobre cualquier dispositivo mecánico o fijo."
    },
    {
        q: "¿Qué indican las flechas blancas pintadas en el pavimento?",
        a: ["La velocidad del viento", "Direcciones permitidas u obligatorias en ese carril", "Ubicación de gasolineras", "Distancia a la capital"],
        c: 1,
        f: "Pág. 113: Guían al conductor sobre los movimientos legales por carril."
    },
    {
        q: "¿Qué significa el color AZUL en los bordes de la acera o parqueos?",
        a: ["Zona de carga", "Espacios reservados para personas con discapacidad (Ley 7600)", "Parada de autobuses", "Prohibido parquear"],
        c: 1,
        f: "Pág. 115: El azul es exclusivo para accesibilidad."
    },
    {
        q: "¿Para qué sirven las señales acústicas (sirenas)?",
        a: ["Para saludar", "Para que los vehículos de emergencia soliciten prioridad de paso", "Para indicar el cambio de semáforo", "Como música ambiental"],
        c: 1,
        f: "Pág. 122: Alertan a otros conductores para que cedan el paso a emergencias."
    },
    {
        q: "Una señal circular con borde rojo y una diagonal roja indica:",
        a: ["Una obligación", "Una prohibición", "Una recomendación", "Fin de la restricción"],
        c: 1,
        f: "Pág. 91: La diagonal roja sobre un pictograma negro prohíbe la acción."
    },
    {
        q: "El semáforo peatonal con una mano roja fija significa:",
        a: ["El peatón puede pasar", "El peatón no debe iniciar el cruce de la calzada", "Peligro de incendio", "Saludo del semáforo"],
        c: 1,
        f: "Pág. 119: Prohíbe al peatón bajar a la calle porque el tránsito vehicular fluye."
    },
    {
        q: "¿Qué indica una línea blanca discontinua (línea de vía)?",
        a: ["Prohibido cambiar de carril", "Permitido el cambio de carril en el mismo sentido", "Doble sentido de circulación", "Zona de derrumbes"],
        c: 1,
        f: "Pág. 110: Divide carriles del mismo sentido y permite el intercambio seguro."
    },
    {
        q: "¿Qué significa que el oficial de tránsito le dé la ESPALDA?",
        a: ["Vía libre", "Alto total", "Que se está retirando", "Que puede girar"],
        c: 1,
        f: "Pág. 120: Espalda o frente es igual a luz roja (ALTO)."
    },
    {
        q: "Las señales de información de DESTINO (ej: 'San José 15km') son de color:",
        a: ["Amarillo", "Blanco o Verde", "Azul", "Rojo"],
        c: 1,
        f: "Pág. 101: El verde se usa para guías de destino y distancias en rutas nacionales."
    },
    {
        q: "¿Cuál es la velocidad máxima en zona escolar cuando NO hay estudiantes?",
        a: ["25 km/h", "40 km/h", "La que indique el rotulo general de la vía", "15 km/h"],
        c: 2,
        f: "Pág. 125: El límite de 25 km/h es solo cuando hay presencia de escolares."
    },
    {
        q: "La señal de UNA VÍA con flecha blanca y fondo negro se clasifica como:",
        a: ["Reglamentaria", "Informativa", "Preventiva", "Transitoria"],
        c: 1,
        f: "Pág. 103: Orienta sobre el sentido de circulación de la vía."
    },
    {
        q: "¿Qué indica la luz amarilla intermitente en un semáforo?",
        a: ["Parada total", "Pasar con precaución (Ceda)", "Cambio a rojo", "Vía cerrada"],
        c: 1,
        f: "Pág. 118: Actúa como una señal de advertencia para cruzar con cuidado."
    },
    {
        q: "¿Para qué sirve el espaldón de la carretera?",
        a: ["Para adelantar rápido", "Para parquearse a dormir", "Como zona de emergencia y soporte lateral de la vía", "Carril de motos"],
        c: 2,
        f: "Pág. 111: No se debe transitar por él; es por seguridad y emergencias."
    },
    {
        q: "Un conductor que saca el brazo izquierdo recto hacia afuera indica:",
        a: ["Giro a la derecha", "Giro a la izquierda", "Reducción de velocidad", "Permiso para que el de atrás lo pase"],
        c: 1,
        f: "Pág. 122: Es la señal manual estándar para virar a la izquierda."
    },
    {
        q: "Las marcas de 'Paso Peatonal' (Cebra) obligan al conductor a:",
        a: ["Pitar para que el peatón se quite", "Ceder la prioridad de paso al peatón", "Pasar rápido si el peatón está lejos", "Parar sobre las líneas"],
        c: 1,
        f: "Pág. 112: El peatón tiene prioridad legal en las zonas demarcadas."
    },
    {
        q: "¿Qué indica una línea blanca continua (de canalización) antes de un cruce?",
        a: ["Permitido zigzaguear", "Prohibido cambiar de carril para organizar el flujo", "Solo para bicicletas", "Indica que hay un oficial"],
        c: 1,
        f: "Pág. 114: Obligan a mantenerse en el carril elegido para evitar colisiones."
    },
    {
        q: "Si la línea de centro es doble, una continua y una discontinua, ¿quién puede adelantar?",
        a: ["Ambos lados", "Solo el conductor que tiene la línea discontinua a su lado", "Nadie", "Solo camiones"],
        c: 1,
        f: "Pág. 109: La línea discontinua otorga el permiso a quien la tiene más cerca."
    }
];

let cur = 0; let score = 0;

function load() {
    const q = db[cur];
    document.getElementById('q-idx').innerText = cur + 1;
    document.getElementById('score-idx').innerText = score;
    document.getElementById('q-text').innerText = q.q;
    const box = document.getElementById('opt-box');
    box.innerHTML = '';
    q.a.forEach((t, i) => {
        const d = document.createElement('div');
        d.className = 'option';
        d.innerText = t;
        d.onclick = () => check(i);
        box.appendChild(d);
    });
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('btn-next').style.display = 'none';
}

function check(i) {
    const q = db[cur];
    const opts = document.getElementsByClassName('option');
    for(let o of opts) o.onclick = null;
    if(i === q.c) {
        opts[i].classList.add('correct');
        score++;
    } else {
        opts[i].classList.add('wrong');
        opts[q.c].classList.add('correct');
    }
    const f = document.getElementById('feedback');
    f.innerText = q.f;
    f.style.display = 'block';
    document.getElementById('btn-next').style.display = 'block';
}

function next() {
    cur++;
    if(cur < db.length) load();
    else {
        document.getElementById('quiz-box').style.display = 'none';
        const res = document.getElementById('res-box');
        res.style.display = 'block';
        const pct = Math.round((score/db.length)*100);
        document.getElementById('final-pct').innerText = pct + "%";
        document.getElementById('final-msg').innerText = pct >= 80 ? "¡Excelente! Has dominado el Capítulo 2." : "Te recomendamos repasar nuevamente el Capítulo 2.";
    }
}

load();
</script>
</body>
</html>
