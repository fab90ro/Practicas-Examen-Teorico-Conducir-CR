<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Pro: Manual Conductor 2026 - Capítulo 1</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; color: #1c1e21; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #004a99; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .status-bar { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; background: #e7f3ff; padding: 10px; border-radius: 8px; }
        .question { font-size: 1.2em; margin-bottom: 20px; font-weight: 600; line-height: 1.4; }
        .options { display: grid; gap: 10px; }
        .option { padding: 15px; border: 2px solid #ddd; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
        .option:hover { background-color: #f8f9fa; border-color: #004a99; }
        .option.correct { background-color: #d4edda; border-color: #28a745; color: #155724; font-weight: bold; }
        .option.wrong { background-color: #f8d7da; border-color: #dc3545; color: #721c24; }
        .feedback { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; font-style: italic; border-left: 5px solid #004a99; background: #f1f8ff; }
        button { width: 100%; padding: 15px; background: #004a99; color: white; border: none; border-radius: 10px; font-size: 1.1em; cursor: pointer; margin-top: 20px; display: none; }
        button:hover { background: #003366; }
        .results { text-align: center; display: none; }
        .score { font-size: 3em; color: #004a99; margin: 20px 0; }
        .badge { display: inline-block; padding: 10px 20px; border-radius: 20px; font-weight: bold; margin-bottom: 20px; }
        .pass { background: #d4edda; color: #155724; }
        .fail { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <h1>Simulador Capítulo 1 (2026)</h1>
    
    <div id="quiz-section">
        <div class="status-bar">
            <span>Pregunta: <span id="current-q">1</span>/50</span>
            <span>Aciertos: <span id="current-score">0</span></span>
        </div>

        <div id="question-container">
            <div class="question" id="q-text">Cargando pregunta...</div>
            <div class="options" id="options-container"></div>
        </div>

        <div class="feedback" id="feedback"></div>
        <button id="next-btn" onclick="nextQuestion()">Siguiente Pregunta</button>
    </div>

    <div class="results" id="results-section">
        <h2>Resultado Final</h2>
        <div class="score" id="final-score">0/100</div>
        <div id="badge-container"></div>
        <p id="result-msg"></p>
        <button style="display:block" onclick="location.reload()">Reiniciar Simulacro</button>
    </div>
</div>

<script>
const questions = [
    {
        q: "¿Qué se considera un 'Conductor Novato' según el manual?",
        a: ["Quien conduce por primera vez después de obtener su licencia por un periodo de 3 años.", "Quien tiene su licencia por un periodo de 2 años después de expedida por primera vez.", "Cualquier persona menor de 21 años con licencia.", "Quien no ha aprobado el curso teórico."],
        c: 1,
        f: "El conductor novato es aquel que se encuentra en un periodo de aprendizaje práctico de 2 años tras obtener su licencia."
    },
    {
        q: "En el triángulo de seguridad vial, ¿cuál factor es responsable del 80% al 90% de los accidentes?",
        a: ["Factor Vehicular", "Factor Ambiental", "Factor Humano", "Factor Mecánico"],
        c: 2,
        f: "El ser humano es el causante de la gran mayoría de los accidentes de tránsito debido a imprudencias o fallos."
    },
    {
        q: "¿Cuál es la distancia lateral mínima obligatoria que debe dejar un conductor al adelantar a un ciclista?",
        a: ["0.5 metros", "1 metro", "1.5 metros", "2 metros"],
        c: 2,
        f: "La Ley exige una separación de al menos 1.5 metros para proteger la integridad del ciclista."
    },
    {
        q: "En una vía rural, ¿cuál es el nombre de la sección lateral de la calzada destinada al tránsito de peatones o estacionamiento de emergencia?",
        a: ["Acera", "Cuneta", "Espaldón", "Caño"],
        c: 2,
        f: "En zonas rurales, el espaldón cumple la función que la acera tiene en zonas urbanas."
    },
    {
        q: "¿Cuántos puntos de acumulación recibe un conductor que obtiene su licencia por primera vez?",
        a: ["0 puntos", "6 puntos", "12 puntos", "4 puntos"],
        c: 1,
        f: "Los conductores por primera vez inician con 6 puntos en su expediente (puntuación de conductor novato)."
    },
    {
        q: "Si un conductor acumula de 0 a 4 puntos en su periodo de vigencia, ¿por cuánto tiempo se le renovará la licencia?",
        a: ["3 años", "4 años", "6 años", "10 años"],
        c: 2,
        f: "La renovación por 6 años es un incentivo para quienes mantienen un historial limpio o de baja infracción."
    },
    {
        q: "Ante la presencia de un vehículo de emergencia con sirenas y luces activas, ¿qué debe hacer el conductor?",
        a: ["Aumentar la velocidad para no estorbar.", "Girar a la izquierda y detenerse.", "Desplazarse a la derecha, despejar el carril y detenerse si es necesario.", "Mantener el carril y frenar en seco."],
        c: 2,
        f: "Se debe facilitar el paso desplazándose a la derecha de forma segura."
    },
    {
        q: "¿A qué distancia se deben colocar los triángulos de seguridad si un vehículo se vara en una carretera de alta velocidad?",
        a: ["15 y 30 metros", "45 y 90 metros", "90 y 150 metros", "10 y 20 metros"],
        c: 1,
        f: "Se colocan uno atrás y otro adelante (o dos atrás según la vía) a distancias que permitan visibilidad anticipada."
    },
    {
        q: "¿Cuál es la regla de oro de la conducción inteligente respecto a la distancia con el vehículo de adelante en condiciones normales?",
        a: ["Regla de los 2 segundos", "Regla de los 4 segundos", "Regla de los 6 metros", "Regla del metro y medio"],
        c: 0,
        f: "La regla de los 2 segundos es la distancia mínima de seguridad en condiciones climáticas y de vía óptimas."
    },
    {
        q: "Cuando la calzada está mojada o es de noche, ¿cómo cambia la regla de distancia de seguridad?",
        a: ["Se mantiene en 2 segundos.", "Se reduce a 1 segundo.", "Se aumenta a 4 segundos.", "Se mide en metros, no en segundos."],
        c: 2,
        f: "En condiciones adversas (lluvia, oscuridad), el tiempo de reacción y frenado requiere duplicar la distancia a 4 segundos."
    },
    {
        q: "¿Qué indica la presencia de una línea de barrera (continua amarilla) en el centro de la carretera?",
        a: ["Permiso para adelantar con cuidado.", "Prohibición total de adelantar.", "Zona de estacionamiento permitida.", "Carril exclusivo para buses."],
        c: 1,
        f: "La línea amarilla continua prohíbe el adelantamiento debido a riesgos de visibilidad o diseño de la vía."
    },
    {
        q: "¿Cuál es la altura mínima y edad recomendada para que un niño pueda viajar en el asiento delantero?",
        a: ["1.10 metros y 10 años", "1.45 metros y 12 años", "1.20 metros y 7 años", "1.50 metros y 15 años"],
        c: 1,
        f: "Por seguridad (activación de airbag y cinturón), se requiere medir 1.45m y tener al menos 12 años."
    },
    {
        q: "¿Qué documento acredita que el vehículo cumplió con la revisión técnica obligatoria?",
        a: ["Título de Propiedad", "Marchamo", "Tarjeta de Inspección Vehicular (IVE/RTV)", "Licencia de conducir"],
        c: 2,
        f: "La IVE (Inspección Vehicular) garantiza que el auto es mecánicamente apto para circular."
    },
    {
        q: "¿Qué es el 'Ángulo Muerto' o Punto Ciego?",
        a: ["Una zona de la carretera donde no hay luz.", "El área alrededor del vehículo que no se puede ver a través de los espejos retrovisores.", "Un fallo en los frenos.", "La curva más cerrada de una vía."],
        c: 1,
        f: "Son zonas invisibles para el conductor que requieren girar la cabeza o usar espejos convexos."
    },
    {
        q: "¿Cuál es la función del Sistema de Evaluación Permanente de Conductores (Sistema de Puntos)?",
        a: ["Cobrar más impuestos.", "Premiar a los que conducen rápido.", "Controlar el comportamiento del conductor y suspender licencias a infractores recurrentes.", "Clasificar los tipos de vehículos."],
        c: 2,
        f: "El sistema busca mejorar la seguridad vial penalizando conductas peligrosas mediante la pérdida de puntos."
    },
    {
        q: "¿Qué debe hacer un conductor al acercarse a una intersección si la luz del semáforo está en amarillo?",
        a: ["Acelerar para pasar antes de que cambie a rojo.", "Detenerse, a menos que ya esté dentro de la intersección o el frenazo cause un accidente.", "Pitar para avisar que va a pasar.", "Poner luces de emergencia."],
        c: 1,
        f: "El amarillo es para avisar que viene el rojo y se debe limpiar la intersección, no para acelerar."
    },
    {
        q: "En una vía urbana, ¿cuál es el componente destinado exclusivamente a la circulación de peatones?",
        a: ["Berma", "Calzada", "Acera", "Cuneta"],
        c: 2,
        f: "La acera es el espacio vital del peatón en la ciudad."
    },
    {
        q: "¿Cómo se debe caminar en una vía pública rural si no existen aceras ni espaldones?",
        a: ["Por el centro del carril.", "Al lado derecho, dando la espalda al tránsito.", "Al lado izquierdo, de frente al tránsito.", "Solo se puede caminar de noche."],
        c: 2,
        f: "Caminar de frente al tránsito permite al peatón ver el peligro y reaccionar."
    },
    {
        q: "¿Qué es la 'Conducción Inteligente'?",
        a: ["Manejar un carro con computadora.", "Conducir de forma preventiva, anticipando riesgos y respetando a los demás.", "Saber reparar el motor en carretera.", "Manejar a la máxima velocidad permitida."],
        c: 1,
        f: "Se basa en la prevención, visión panorámica y cortesía vial."
    },
    {
        q: "¿Cuál es el tiempo máximo de conducción continua recomendado antes de realizar una 'Pausa Activa'?",
        a: ["1 hora", "2 horas", "5 horas", "8 horas"],
        c: 1,
        f: "Se recomienda descansar cada 2 horas o 200 km para evitar la fatiga y la hipnosis del camino."
    },
    {
        q: "¿Qué significa que el transporte sea 'Sostenible'?",
        a: ["Que sea muy rápido.", "Que satisfaga las necesidades de movilidad minimizando el impacto ambiental y social.", "Que no use gasolina.", "Que solo use buses."],
        c: 1,
        f: "La movilidad sostenible busca equilibrio entre eficiencia, ambiente y salud."
    },
    {
        q: "¿Quién tiene la prioridad de paso en un paso peatonal (cebra) no regulado por semáforo?",
        a: ["El vehículo más grande.", "El vehículo que viene más rápido.", "El peatón.", "Nadie, es por cortesía."],
        c: 2,
        f: "El peatón siempre tiene la prioridad en las zonas demarcadas para su cruce."
    },
    {
        q: "¿Qué tipo de placa identifica a los vehículos de transporte de carga liviana?",
        a: ["Placa con letra C", "Placa con letra CL", "Placa con letra P", "Placa con letra T"],
        c: 1,
        f: "CL corresponde a Carga Liviana según la nomenclatura oficial."
    },
    {
        q: "Al transportar mascotas en un vehículo, ¿cuál es la forma más segura?",
        a: ["En el regazo del acompañante.", "Sueltas en el asiento trasero.", "En un dispositivo de sujeción (arnés) o transportadora debidamente asegurada.", "En el maletero cerrado."],
        c: 2,
        f: "Una mascota suelta es un proyectil en caso de choque y puede distraer al conductor."
    },
    {
        q: "¿Cuál es la sanción por obstruir una intersección (quedar atravesado) aunque el semáforo esté en verde?",
        a: ["No hay sanción.", "Multa de categoría C y pérdida de puntos.", "Multa económica sin pérdida de puntos.", "Suspensión inmediata de la licencia."],
        c: 1,
        f: "Obstruir el paso en una intersección es una falta que afecta la fluidez y seguridad vial."
    },
    {
        q: "La 'Adherencia' de los neumáticos disminuye principalmente por:",
        a: ["Usar aire acondicionado.", "Lluvia, nieve, aceite o desgaste excesivo de la banda de rodamiento.", "Manejar de día.", "Tener el tanque de gasolina lleno."],
        c: 1,
        f: "Factores externos y el estado de la llanta determinan qué tanto se agarra el auto al suelo."
    },
    {
        q: "¿Qué es el SOA?",
        a: ["Seguro Obligatorio de Automóviles (incluido en el marchamo).", "Sistema de Operación de Alarmas.", "Servicio de Auxilio en Carretera.", "Sindicato de Oficiales de Tránsito."],
        c: 0,
        f: "Es el seguro que cubre la atención médica de personas heridas en accidentes de tránsito."
    },
    {
        q: "Para obtener la licencia B1 por primera vez, ¿cuál es el requisito de edad mínima?",
        a: ["16 años", "18 años", "21 años", "25 años"],
        c: 1,
        f: "La mayoría de edad (18 años) es requisito para la licencia tipo B."
    },
    {
        q: "¿Qué sucede si un conductor novato acumula más de 6 puntos en sus primeros 2 años?",
        a: ["Paga una multa y sigue manejando.", "Se le suspende la licencia por un año.", "Se le quita la licencia permanentemente.", "Debe hacer el curso teórico de nuevo solamente."],
        c: 1,
        f: "Los conductores novatos tienen un umbral de tolerancia menor y pierden la licencia más fácilmente."
    },
    {
        q: "¿Cuál es la función del 'Carril de Canalización'?",
        a: ["Para que los buses recojan pasajeros.", "Para guiar el giro a la izquierda o derecha de forma segura, separándolo del flujo principal.", "Para correr a más de 100 km/h.", "Para estacionarse."],
        c: 1,
        f: "Estos carriles ordenan el tránsito en intersecciones complejas."
    },
    {
        q: "¿Qué se define como 'Semoviente' en el manual?",
        a: ["Un vehículo que se mueve solo.", "Animales de carga o ganado que circulan por la vía.", "Un oficial de tránsito en moto.", "Un semáforo dañado."],
        c: 1,
        f: "Incluye vacas, caballos y otros animales de producción que pueden estar en carretera."
    },
    {
        q: "¿Cómo se debe distribuir el equipaje dentro del vehículo?",
        a: ["Todo en el asiento del pasajero para tenerlo cerca.", "En el maletero, colocando lo más pesado al fondo y asegurado.", "En el techo sin amarrar.", "Donde haya campo."],
        c: 1,
        f: "El peso debe estar equilibrado y los objetos no deben volar en caso de frenazo."
    },
    {
        q: "¿Cuál es el principal riesgo de la 'Hipnosis de la Carretera'?",
        a: ["Hacer que el conductor maneje mejor.", "Perder la noción de la velocidad y el entorno debido a la monotonía.", "Quedarse ciego por el sol.", "Gastar más combustible."],
        c: 1,
        f: "Ocurre en viajes largos y rectos, reduciendo la capacidad de reacción."
    },
    {
        q: "¿Qué significa la sigla MOPT?",
        a: ["Municipalidad de Obras de Pozos y Tierra.", "Ministerio de Obras Públicas y Transportes.", "Manual Oficial de Pasajeros y Tránsito.", "Manejo Operativo de Patrullas Terrestres."],
        c: 1,
        f: "Es la institución máxima encargada del tránsito en Costa Rica."
    },
    {
        q: "¿Cuál de estos NO es un requisito para el Permiso Temporal de Aprendizaje?",
        a: ["Haber aprobado el examen teórico.", "Tener dictamen médico vigente.", "Tener un vehículo propio a su nombre.", "Pagar el seguro correspondiente."],
        c: 2,
        f: "No es necesario ser dueño del auto para aprender a manejar."
    },
    {
        q: "En una autopista, ¿cuál carril se debe usar para adelantar?",
        a: ["El carril derecho.", "El carril central.", "El carril izquierdo.", "Cualquiera que esté vacío."],
        c: 2,
        f: "El carril izquierdo es exclusivamente para maniobras de adelantamiento."
    },
    {
        q: "¿Qué es el 'Sentido de Circulación'?",
        a: ["Hacia donde va el viento.", "La dirección obligatoria en la que deben moverse los vehículos en una vía.", "La forma en que gira el volante.", "La intuición del conductor."],
        c: 1,
        f: "Respetar el sentido de la vía evita choques frontales."
    },
    {
        q: "¿Cuál es el objetivo principal de la Seguridad Vial?",
        a: ["Vender más carros.", "Prevenir accidentes de tránsito y minimizar sus efectos.", "Hacer carreteras más bonitas.", "Cobrar multas."],
        c: 1,
        f: "La prioridad absoluta es proteger la vida humana."
    },
    {
        q: "¿Qué tipo de licencia permite conducir motocicletas de cualquier cilindrada (Moto Grande)?",
        a: ["A1", "A2", "A3", "B1"],
        c: 2,
        f: "La A3 es para motocicletas sin límite de potencia o cilindraje."
    },
    {
        q: "¿Qué se debe revisar en el vehículo ANTES de iniciar un viaje largo?",
        a: ["Solo que tenga gasolina.", "Niveles de líquidos, presión de llantas, luces y frenos.", "Que la radio funcione.", "Si tiene los vidrios limpios solamente."],
        c: 1,
        f: "La revisión preventiva evita fallos mecánicos en ruta."
    },
    {
        q: "¿Cuál es la función del 'Espaldón' en carreteras rurales?",
        a: ["Para adelantar cuando hay mucha presa.", "Para tránsito de peatones, parada de emergencia o soporte de la calzada.", "Es un carril exclusivo para bicicletas.", "Para sembrar árboles."],
        c: 1,
        f: "Brinda seguridad lateral y espacio para emergencias."
    },
    {
        q: "¿Qué documento NO es necesario portar físicamente según las nuevas normativas (si se tiene digital)?",
        a: ["Cédula de identidad.", "Licencia de conducir y tarjeta de circulación (siempre que el sistema sea verificable).", "Título de propiedad.", "Recibo del marchamo."],
        c: 1,
        f: "Aunque se permite verificación digital, el conductor debe asegurar que los documentos estén vigentes en sistema."
    },
    {
        q: "¿Qué grupo se considera el más vulnerable en la vía pública?",
        a: ["Conductores de trailers.", "Peatones (especialmente niños, adultos mayores y personas con discapacidad).", "Conductores de buses.", "Oficiales de tránsito."],
        c: 1,
        f: "Su cuerpo es su única carrocería ante un impacto."
    },
    {
        q: "Un conductor que maneja bajo efectos del alcohol por encima del límite permitido comete una:",
        a: ["Falta leve.", "Infracción administrativa solamente.", "Contravención o delito según el grado de alcohol y la Ley.", "Cortesía vial."],
        c: 2,
        f: "El alcohol al volante es una de las causas más graves de accidentes y tiene penas severas."
    },
    {
        q: "¿Qué es la 'Cuneta'?",
        a: ["Una parte del motor.", "Zanja al lado de la vía para recoger aguas pluviales.", "El asiento del bebé.", "La parte superior del semáforo."],
        c: 1,
        f: "Su función es el drenaje para evitar inundaciones en la calzada."
    },
    {
        q: "Al conducir en una zona escolar, la velocidad máxima permitida (cuando hay estudiantes) es:",
        a: ["40 km/h", "25 km/h", "30 km/h", "15 km/h"],
        c: 1,
        f: "La Ley establece 25 km/h como límite máximo en presencia de menores en centros educativos."
    },
    {
        q: "¿Qué significa tener 'Cortesía Vial'?",
        a: ["Saludar a todos.", "Ceder el paso cuando sea seguro y facilitar la movilidad de los demás.", "Manejar muy despacio.", "No usar el pito nunca."],
        c: 1,
        f: "La cortesía reduce el estrés vial y los conflictos."
    },
    {
        q: "¿Qué es un 'Vehículo de Tracción Humana'?",
        a: ["Un carro empujado por gente.", "Bicicletas, carretillas o similares movidos por esfuerzo físico.", "Un patinete eléctrico.", "Un bus lleno."],
        c: 1,
        f: "La bicicleta es el ejemplo más común."
    },
    {
        q: "¿Cuál es la sanción por conducir con la licencia vencida?",
        a: ["No hay sanción si es por menos de un mes.", "Multa de categoría C.", "Retiro del vehículo solamente.", "Cárcel."],
        c: 1,
        f: "Manejar con documento vencido es una infracción a la Ley de Tránsito."
    },
    {
        q: "El 'Factor Ambiental' incluye:",
        a: ["Estado de ánimo del conductor.", "Condiciones del clima, estado de la carretera y señalización.", "Estado de las llantas.", "Uso de cinturón."],
        c: 1,
        f: "Todo lo externo al conductor y al vehículo."
    }
];

let currentIdx = 0;
let score = 0;

function loadQuestion() {
    const q = questions[currentIdx];
    document.getElementById('q-text').innerText = q.q;
    document.getElementById('current-q').innerText = currentIdx + 1;
    
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    
    q.a.forEach((opt, i) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.innerText = opt;
        div.onclick = () => checkAnswer(i);
        container.appendChild(div);
    });
    
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
}

function checkAnswer(idx) {
    const q = questions[currentIdx];
    const opts = document.getElementsByClassName('option');
    
    // Bloquear clics
    for(let opt of opts) opt.onclick = null;

    if(idx === q.c) {
        opts[idx].classList.add('correct');
        score++;
        document.getElementById('current-score').innerText = score;
    } else {
        opts[idx].classList.add('wrong');
        opts[q.c].classList.add('correct');
    }

    const feedback = document.getElementById('feedback');
    feedback.innerText = q.f;
    feedback.style.display = 'block';
    document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
    currentIdx++;
    if(currentIdx < questions.length) {
        loadQuestion();
    } else {
        showResults();
    }
}

function showResults() {
    document.getElementById('quiz-section').style.display = 'none';
    const res = document.getElementById('results-section');
    res.style.display = 'block';
    
    const finalScore = Math.round((score / questions.length) * 100);
    document.getElementById('final-score').innerText = finalScore + "/100";
    
    const badge = document.getElementById('badge-container');
    const msg = document.getElementById('result-msg');
    
    if(finalScore >= 80) {
        badge.innerHTML = '<span class="badge pass">APROBADO</span>';
        msg.innerText = "¡Excelente! Tienes un dominio sólido del Capítulo 1. Estás listo para el siguiente nivel.";
    } else {
        badge.innerHTML = '<span class="badge fail">REPROBADO</span>';
        msg.innerText = "Necesitas repasar un poco más. El examen oficial requiere un mínimo de 80 para ganar.";
    }
}

// Iniciar
loadQuestion();
</script>

</body>
</html>
</html>
